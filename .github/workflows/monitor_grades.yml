name: Fudan Grades Monitor

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      renotify_course:
        description: 'Optional course code or course name substring to notify again'
        required: false
        default: ''

concurrency:
  group: fudan-grades-monitor
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  monitor-grades:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pycryptodome cryptography pyotp

    - name: Mask manual notification input
      if: ${{ inputs.renotify_course != '' }}
      run: echo "::add-mask::${{ inputs.renotify_course }}"

    - name: Run grade crawler
      env:
        StuId: ${{ secrets.STUDENT_ID }}
        UISPsw: ${{ secrets.UIS_PASSWORD }}
        SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        # Backward compatibility
        QQ_SMTP: ${{ secrets.QQ_SMTP_AUTH_CODE }}
        QQ_EMAIL_SENDER: ${{ secrets.QQ_EMAIL_SENDER }}
        RENOTIFY_COURSE: ${{ inputs.renotify_course }}
        CAMPUS_ACCESS: auto
        ATRUST_PORTAL: ${{ secrets.ATRUST_PORTAL }}
        ATRUST_TOTP_SECRET: ${{ secrets.ATRUST_TOTP_SECRET }}
        ATRUST_COOKIE_TID: ${{ secrets.ATRUST_COOKIE_TID }}
        ATRUST_COOKIE_SIG: ${{ secrets.ATRUST_COOKIE_SIG }}
      run: python crawl_grades.py
    
    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add grades_encrypted.json
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update encrypted grades"
          git pull --rebase
          git push
        fi
